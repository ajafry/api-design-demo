name: Unit Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore ApiDesignDemo.slnx

      - name: Build
        run: dotnet build ApiDesignDemo.slnx --no-restore --configuration Release

      - name: Run SharedKernel unit tests
        run: dotnet test tests/SharedKernel.Tests/SharedKernel.Tests.csproj --no-build --configuration Release

      - name: Run ProductService unit tests
        run: dotnet test tests/ProductService.Tests/ProductService.Tests.csproj --no-build --configuration Release

      - name: Run OrderService unit tests
        run: dotnet test tests/OrderService.Tests/OrderService.Tests.csproj --no-build --configuration Release
