name: Build and Push Container Images

on:
  workflow_dispatch:
    inputs:
      acr_name:
        description: 'Azure Container Registry name (without .azurecr.io) — overrides the ACR_NAME secret when provided'
        required: false
        default: ''
        type: string
      image_tag:
        description: 'Image tag (defaults to the short commit SHA)'
        required: false
        default: ''
        type: string

env:
  IMAGE_TAG: ${{ github.event.inputs.image_tag != '' && github.event.inputs.image_tag || github.sha }}

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-service
            dockerfile: src/Services/OrderService/OrderService.API/Dockerfile
          - name: product-service
            dockerfile: src/Services/ProductService/ProductService.API/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve registry name
        id: registry
        run: |
          ACR_NAME="${{ github.event.inputs.acr_name }}"
          if [ -z "$ACR_NAME" ]; then
            ACR_NAME="${{ secrets.ACR_NAME }}"
          fi
          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR name must be provided via the workflow input or the ACR_NAME secret."
            exit 1
          fi
          echo "login_server=${ACR_NAME}.azurecr.io" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ steps.registry.outputs.login_server }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ steps.registry.outputs.login_server }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ steps.registry.outputs.login_server }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
